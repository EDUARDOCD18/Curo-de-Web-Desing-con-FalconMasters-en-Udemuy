<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href=".././public/estilos.css" />
    <title>Grid</title>
  </head>
  <body class="">
    <h2 class="m-5 h-10 font-bold text-3xl">Display</h2>

    <p class="m-5">.grid</p>
    <div class="grid gap-5 m-5 bg-slate-200 p-5">
        <div class="bg-indigo-500 text-white p-5">Caja 1</div>
        <div class="bg-indigo-500 text-white p-5">Caja 1</div>
        <div class="bg-indigo-500 text-white p-5">Caja 1</div>
        <div class="bg-indigo-500 text-white p-5">Caja 1</div>
    </div>

    <p class="m-5">.inline-grid</p>
    <div class="inline-grid gap-5 mx-5 bg-slate-200 p-5">
        <div class="bg-indigo-500 text-white p-5">Caja 1</div>
        <div class="bg-indigo-500 text-white p-5">Caja 1</div>
        <div class="bg-indigo-500 text-white p-5">Caja 1</div>
        <div class="bg-indigo-500 text-white p-5">Caja 1</div>
    </div>

     <h2 class="m-5 h-10 font-bold text-3xl">Templates columns</h2>
    
     <p class="m-5">.grid-cols-#</p>
    <div class="grid grid-cols-4 gap-5 mx-5 bg-slate-200 p-5">
        <div class="bg-indigo-500 text-white p-5">Caja 1</div>
        <div class="bg-indigo-500 text-white p-5">Caja 2</div>
        <div class="bg-indigo-500 text-white p-5">Caja 3</div>
        <div class="bg-indigo-500 text-white p-5">Caja 4</div>
    </div>
    
     <p class="m-5">.grid-rows-#</p>
    <div class="grid grid-rows-3 grid-flow-col gap-5 mx-5 bg-slate-200 p-5">
        <div class="bg-indigo-500 text-white p-5">Caja 1</div>
        <div class="bg-indigo-500 text-white p-5">Caja 2</div>
        <div class="bg-indigo-500 text-white p-5">Caja 3</div>
        <div class="bg-indigo-500 text-white p-5">Caja 4</div>
    </div>

  </body>
</html>
