<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href=".././public/estilos.css" />
    <title>Flexbox</title>
  </head>
  <body>
    <h2 class="m-5 mt-10 font-bold text-3xl">Display</h2>
    <p class="m-5">.flex</p>
    <div class="flex bg-slate-200 p-5 m-5 gap-4 justify-between">
      <div class="bg-indigo-700 text-white p-5">Caja</div>
      <div class="bg-indigo-700 text-white p-5">Caja</div>
      <div class="bg-indigo-700 text-white p-5">Caja</div>
      <div class="bg-indigo-700 text-white p-5">Caja</div>
      <div class="bg-indigo-700 text-white p-5">Caja</div>
    </div>
    <p class="m-5">.inline-flex</p>
    <div class="inline-flex bg-slate-200 p-5 m-5 gap-4 justify-between">
      <div class="bg-indigo-700 text-white p-5">Caja</div>
      <div class="bg-indigo-700 text-white p-5">Caja</div>
      <div class="bg-indigo-700 text-white p-5">Caja</div>
      <div class="bg-indigo-700 text-white p-5">Caja</div>
      <div class="bg-indigo-700 text-white p-5">Caja</div>
      <div class="bg-indigo-700 text-white p-5">Caja</div>
      <div class="bg-indigo-700 text-white p-5">Caja</div>
      <div class="bg-indigo-700 text-white p-5">Caja</div>
      <div class="bg-indigo-700 text-white p-5">Caja</div>
    </div>

    <h2 class="m-5 mt-10 font-bold text-3xl">Grow, Shrink, Flex</h2>
    <p class="m-5">Grow</p>
    <div class="flex bg-slate-200 p-5 m-5 gap-4">
      <div class="bg-indigo-700 text-white p-5 grow-0">Grow-0</div>
      <div class="bg-indigo-700 text-white p-5 grow">Grow</div>
      <div class="bg-indigo-700 text-white p-5 grow">Grow</div>
    </div>

    <p class="m-5">Shrink</p>
    <div class="flex bg-slate-200 p-5 m-5 gap-4">
      <div class="bg-indigo-700 text-white p-5 w-80 shrink-0">Shrink-0</div>
      <div class="bg-indigo-700 text-white p-5 w-80 shrink">Shrink</div>
      <div class="bg-indigo-700 text-white p-5 w-80 shrink">Shrink</div>
    </div>

    <p class="m-5">Flex None y Initial</p>
    <div class="flex bg-slate-200 p-5 m-5 gap-4">
      <div class="bg-indigo-700 text-white p-5 w-80 flex-none">flex-none</div>
      <div class="bg-indigo-700 text-white p-5 w-80 flex-initial">flex-initial</div>
    </div>
  </body>
</html>
