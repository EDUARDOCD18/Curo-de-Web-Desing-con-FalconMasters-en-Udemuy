<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href=".././public/estilos.css" />
    <title>Flexbox 2</title>
  </head>
  <body>
    <h2 class="m-5 mt-10 font-bold text-3xl">Aling items (row)</h2>
    <p class="m-5">.items-start</p>
    <div class="flex gap-5 m-5 bg-slate-200 p-5 h-60 items-start">
      <div class="bg-indigo-500 text-white p-5 w-40">1</div>
      <div class="bg-indigo-500 text-white p-5 w-40">2</div>
      <div class="bg-indigo-500 text-white p-5 w-40">3</div>
    </div>

    <p class="m-5">.items-end</p>
    <div class="flex gap-5 m-5 bg-slate-200 p-5 h-60 items-end">
      <div class="bg-indigo-500 text-white p-5 w-40">1</div>
      <div class="bg-indigo-500 text-white p-5 w-40">2</div>
      <div class="bg-indigo-500 text-white p-5 w-40">3</div>
    </div>

    <p class="m-5">.items-center</p>
    <div class="flex gap-5 m-5 bg-slate-200 p-5 h-60 items-center">
      <div class="bg-indigo-500 text-white p-5 w-40">1</div>
      <div class="bg-indigo-500 text-white p-5 w-40">2</div>
      <div class="bg-indigo-500 text-white p-5 w-40">3</div>
    </div>

    <p class="m-5">.items-baseline</p>
    <div class="flex gap-5 m-5 bg-slate-200 p-5 h-60 items-baseline">
      <div class="bg-indigo-500 text-white p-5 w-40 pt-20">1</div>
      <div class="bg-indigo-500 text-white p-5 w-40">2</div>
      <div class="bg-indigo-500 text-white p-5 w-40 pb-20">3</div>
    </div>

    <p class="m-5">.items-stretch</p>
    <div class="flex gap-5 m-5 bg-slate-200 p-5 h-60 items-stretch">
      <div class="bg-indigo-500 text-white p-5 w-40">1</div>
      <div class="bg-indigo-500 text-white p-5 w-40">2</div>
      <div class="bg-indigo-500 text-white p-5 w-40">3</div>
    </div>

    <h2 class="m-5 mt-10 font-bold text-3xl">Aling items (col)</h2>

    <p class="m-5">.items-start</p>
    <div class="flex gap-5 m-5 bg-slate-200 p-5 items-start flex-col">
      <div class="bg-indigo-500 text-white p-5 w-40">1</div>
      <div class="bg-indigo-500 text-white p-5 w-40">2</div>
      <div class="bg-indigo-500 text-white p-5 w-40">3</div>
    </div>

    <p class="m-5">.items-end</p>
    <div class="flex gap-5 m-5 bg-slate-200 p-5 items-end flex-col">
      <div class="bg-indigo-500 text-white p-5 w-40">1</div>
      <div class="bg-indigo-500 text-white p-5 w-40">2</div>
      <div class="bg-indigo-500 text-white p-5 w-40">3</div>
    </div>

    <p class="m-5">.items-center</p>
    <div class="flex gap-5 m-5 bg-slate-200 p-5 items-center flex-col">
      <div class="bg-indigo-500 text-white p-5 w-40">1</div>
      <div class="bg-indigo-500 text-white p-5 w-40">2</div>
      <div class="bg-indigo-500 text-white p-5 w-40">3</div>
    </div>

    <p class="m-5">.items-baseline</p>
    <div class="flex gap-5 m-5 bg-slate-200 p-5 items-baseline flex-col">
      <div class="bg-indigo-500 text-white p-5 w-40">1</div>
      <div class="bg-indigo-500 text-white p-5 w-40">2</div>
      <div class="bg-indigo-500 text-white p-5 w-40">3</div>
    </div>

    <p class="m-5">.items-stretch</p>
    <div class="flex gap-5 m-5 bg-slate-200 p-5 items-stretch flex-col">
      <div class="bg-indigo-500 text-white p-5">1</div>
      <div class="bg-indigo-500 text-white p-5">2</div>
      <div class="bg-indigo-500 text-white p-5">3</div>
    </div>
  </body>
</html>
