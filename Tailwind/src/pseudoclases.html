<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href=".././public/estilos.css" />
    <title>Pseudo</title>
  </head>
  <body class="slate-200">
    <button
      class="bg-indigo-500 text-white py-3 px-5 m-5 rounded-sm cursor-pointer hover:bg-indigo-800 outline-hidden focus:ring-4 focus:ring-indigo-400 active:bg-amber-400"
    >
      Soy un botón
    </button>

    <div
      class="w-40 h-40 m-5 bg-indigo-500 relative before:w-10 before:h-10 before:rounded-full before:absolute before:top-0 before:left-0 before:bg-amber-500"
    ></div>

    <input
      type="text"
      name=""
      class="p-3 m-5 border-2 border-indigo-300 placeholder:text-indigo-300 rounded-sm focus:ring-4 focus:ring-red-200 focus:ring-offset-2"
      placeholder="Hola, soy un input"
    />

    <p class="selection:bg-green-300">
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Eos dicta
      laborum, voluptates, ipsum id consequuntur maxime eius repellendus ratione
