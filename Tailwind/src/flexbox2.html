<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href=".././public/estilos.css" />
    <title>Flexbox 2</title>
  </head>
  <body>
    <h2 class="m-5 mt-10 font-bold text-3xl">Direction</h2>
    <p class="m-5">.flex-row</p>
    <div class="flex gap-5 m-5 bg-slate-200 p-5 flex-row">
        <div class="bg-indigo-500 text-white p-5 w-80">1</div>
        <div class="bg-indigo-500 text-white p-5 w-80">2</div>
        <div class="bg-indigo-500 text-white p-5 w-80">3</div>
    </div>

    <p class="m-5">.flex-row-reverse</p>
    <div class="flex gap-5 m-5 bg-slate-200 p-5 flex-row-reverse">
        <div class="bg-indigo-500 text-white p-5 w-80">1</div>
        <div class="bg-indigo-500 text-white p-5 w-80">2</div>
        <div class="bg-indigo-500 text-white p-5 w-80">3</div>
    </div>

    <p class="m-5">.flex-col</p>
    <div class="flex gap-5 m-5 bg-slate-200 p-5 flex-col">
        <div class="bg-indigo-500 text-white p-5 w-80">1</div>
        <div class="bg-indigo-500 text-white p-5 w-80">2</div>
        <div class="bg-indigo-500 text-white p-5 w-80">3</div>
    </div>

    <p class="m-5">.flex-col-reverse</p>
    <div class="flex gap-5 m-5 bg-slate-200 p-5 flex-col-reverse">
        <div class="bg-indigo-500 text-white p-5 w-80">1</div>
        <div class="bg-indigo-500 text-white p-5 w-80">2</div>
        <div class="bg-indigo-500 text-white p-5 w-80">3</div>
    </div>
  </body>
</html>
